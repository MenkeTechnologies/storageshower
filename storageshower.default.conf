# storageshower default configuration
# Copy to ~/.storageshower.conf to customise

# ── Display ──────────────────────────────────────────────
sort_mode   = "Name"        # Name | Pct | Size
sort_rev    = false
bar_style   = "Gradient"    # Gradient | Solid | Thin | Ascii
color_mode  = "Default"     # Default | Green | Blue | Purple
unit_mode   = "Human"       # Human | GiB | MiB | Bytes
show_bars   = true
show_border = true
show_header = true
compact     = false
show_used   = true
full_mount  = false

# ── Column widths (0 = auto, set via mouse drag) ────────
col_mount_w   = 0           # mount-name column width
col_bar_end_w = 0           # right panel total width
col_pct_w     = 0           # pct sub-column width (default 5)

# ── Thresholds ───────────────────────────────────────────
thresh_warn = 70            # 50 | 60 | 70 | 80
thresh_crit = 90            # 80 | 85 | 90 | 95

# ── Filtering ────────────────────────────────────────────
show_local  = false
show_all    = true

# ── Refresh ──────────────────────────────────────────────
refresh_rate = 1            # 1 | 2 | 5 | 10 (seconds)

# ── Keybindings ──────────────────────────────────────────
#
# General
#   q / Q         Quit
#   h / H / ?     Toggle help overlay
#   p / P         Pause / resume refresh
#   Esc           Deselect disk
#
# Navigation (vim-style)
#   j / Down      Next disk
#   k / Up        Previous disk
#   G / End       Jump to last disk
#   Home / Ctrl+g Jump to first disk
#   Ctrl+d        Half-page down
#   Ctrl+u        Half-page up
#
# Sorting
#   n / N         Sort by name   (toggle reverse if active)
#   u / U         Sort by usage  (toggle reverse if active)
#   s / S         Sort by size   (toggle reverse if active)
#   r / R         Toggle reverse sort
#   Click header  Cycle sort on that column
#
# Display toggles
#   b             Cycle bar style
#   c             Cycle colour mode
#   v / V         Toggle bars
#   d / D         Toggle used / size column
#   g             Toggle column headers
#   x / X         Toggle border
#   m / M         Toggle compact mount names
#   w / W         Toggle full mount paths
#   i / I         Cycle units (Human / GiB / MiB / Bytes)
#
# Thresholds & refresh
#   t             Cycle warning threshold
#   T             Cycle critical threshold
#   f / F         Cycle refresh rate
#
# Filtering (live — results update as you type)
#   l / L         Toggle local disks only
#   a / A         Toggle all filesystems
#   /             Enter filter mode
#   0             Clear filter
#
# Filter-mode editing
#   Enter         Confirm & close
#   Esc           Cancel (restore previous filter)
#   Backspace     Delete char before cursor
#   Delete        Delete char at cursor
#   Ctrl+w        Delete word backward
#   Ctrl+u        Clear line before cursor
#   Ctrl+k        Delete to end of line
#   Ctrl+a/Home   Cursor to start
#   Ctrl+e/End    Cursor to end
#   Ctrl+b/Left   Cursor left
#   Ctrl+f/Right  Cursor right
#
# Disk operations
#   Enter         Open mount in file manager
#   y / Y         Copy mount path to clipboard
#   e / E         Export disk matrix to file
#
# Mouse
#   Left-drag on column separator  Resize columns
#   Left-click on column header    Cycle sort
#   Right-click                    Toggle help overlay
