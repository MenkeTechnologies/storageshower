name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          strip storageshower 2>/dev/null || true
          tar czf ../../../storageshower-${{ github.ref_name }}-${{ matrix.target }}.tar.gz storageshower
          cd ../../..

      - uses: actions/upload-artifact@v4
        with:
          name: storageshower-${{ matrix.target }}
          path: storageshower-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*.tar.gz

  homebrew:
    name: Update Homebrew tap
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute SHA256 sums
        id: sha
        shell: bash
        run: |
          for f in artifacts/*.tar.gz; do
            base=$(basename "$f")
            sum=$(sha256sum "$f" | awk '{print $1}')
            key=$(echo "$base" | sed 's/storageshower-v[^-]*-//; s/\.tar\.gz//; s/-/_/g; s/\./_/g')
            echo "${key}=${sum}" >> "$GITHUB_OUTPUT"
          done

      - uses: actions/checkout@v6
        with:
          repository: MenkeTechnologies/homebrew-menketech
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update formula
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION#v}"
          cd tap
          cat > Formula/storageshower.rb <<'FORMULA_HEAD'
          class Storageshower < Formula
            desc "Cyberpunk disk-usage TUI in Rust (ratatui + sysinfo, drill-down + theme editor)"
            homepage "https://github.com/MenkeTechnologies/storageshower"
            license "MIT"
          FORMULA_HEAD
          cat >> Formula/storageshower.rb <<EOF
            version "${VERSION}"

            on_macos do
            on_arm do
              url "https://github.com/MenkeTechnologies/storageshower/releases/download/v${VERSION}/storageshower-v${VERSION}-aarch64-apple-darwin.tar.gz"
              sha256 "${{ steps.sha.outputs.aarch64_apple_darwin }}"
            end
            # x86_64 macOS not supported — see release.yml matrix.
            end

            on_linux do
            on_intel do
              url "https://github.com/MenkeTechnologies/storageshower/releases/download/v${VERSION}/storageshower-v${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "${{ steps.sha.outputs.x86_64_unknown_linux_gnu }}"
            end
            end

            def install
            bin.install "storageshower"
            end

            test do
              # TUI binary — --version is the contract we test (no interactive launch in CI).
              assert_match version.to_s, shell_output("#{bin}/storageshower --version 2>&1", 0..2)
            end
          end
          EOF

      - name: Push formula update
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/storageshower.rb
          if git diff --cached --quiet; then
            echo "no changes — formula already up to date"
            exit 0
          fi
          git commit -m "storageshower: bump to ${{ github.ref_name }}"
          git push
